<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover, user-scalable=no, interactive-widget=overlays-content" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Fluid Words" />
  <meta name="theme-color" content="#03010a" />
  <meta name="description" content="Fluid Words — write with cosmic energy particles." />
  <title>Fluid Words</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Nunito:wght@300;400;500&family=Shippori+Mincho:wght@400;500&family=Zen+Maru+Gothic:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=35" />
</head>
<body>
  <canvas id="fluid" aria-hidden="true"></canvas>
  <canvas id="stars" aria-hidden="true"></canvas>
  <canvas id="ripple" aria-hidden="true"></canvas>

  <!-- 起動時だけ出るヒーロー。タッチで閉じる -->
  <div id="intro" class="intro">
    <p class="intro-mark">Fluid Words</p>
    <p class="intro-sub">指で伝える</p>
    <p class="intro-hint">タップして始める</p>
  </div>

  <p class="brand-corner" id="brand-corner">Fluid Words</p>

  <button type="button" id="btn-settings" class="btn-settings" aria-label="設定を開く" aria-expanded="false">
    <span class="btn-settings-icon" aria-hidden="true"></span>
  </button>

  <aside id="settings-panel" class="settings-panel" hidden>
    <header class="settings-head">
      <p class="settings-title">Settings</p>
      <button type="button" id="btn-settings-close" class="btn-close" aria-label="閉じる">×</button>
    </header>
    <section class="settings-section">
      <p class="settings-label">Color</p>
      <div class="palette" id="palette" role="group" aria-label="Color palettes"></div>
    </section>
    <section class="settings-section">
      <p class="settings-label">太さ</p>
      <div class="stroke-slider">
        <span class="stroke-slider-edge">細い</span>
        <input type="range" id="stroke-width-slider" min="0" max="100" step="1" value="25" aria-label="太さ：細いから太い" />
        <span class="stroke-slider-edge">太い</span>
      </div>
    </section>
    <section class="settings-section">
      <p class="settings-label">消える時間</p>
      <div class="stroke-slider">
        <span class="stroke-slider-edge">短い</span>
        <input type="range" id="stroke-fade-slider" min="0" max="100" step="1" value="67" aria-label="消える時間：短いから長い" />
        <span class="stroke-slider-edge">長い</span>
      </div>
    </section>
    <p class="settings-foot" id="settings-foot">筆跡: 太さ・長さを調整</p>
  </aside>

  <div id="touch-layer" aria-hidden="true"></div>
  <div id="pos-toast" class="pos-toast" hidden aria-live="polite"></div>

  <script type="module" src="js/main.js?v=35"></script>
</body>
</html>
